name: PR Quality Check

on:
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: ESLint Code Style Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run lint

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run type-check

  build:
    name: Build Project
    runs-on: ubuntu-latest
    needs: [lint, type-check]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: npm run build

  report:
    name: Generate PR Report
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read
      pull-requests: write
    needs: [lint, type-check, build]
    if: always()
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const results = {
              lint: '${{ needs.lint.result }}',
              typeCheck: '${{ needs.type-check.result }}',
              build: '${{ needs.build.result }}'
            };
            
            const allPassed = Object.values(results).every(r => r === 'success');
            
            const report = `## 📋 PR Quality Report
            
            | Check | Status |
            |-------|--------|
            | Code Style (ESLint) | ${results.lint === 'success' ? '✅' : '❌'} |
            | TypeScript Type Check | ${results.typeCheck === 'success' ? '✅' : '❌'} |
            | Build | ${results.build === 'success' ? '✅' : '❌'} |
            
            ${allPassed ? '### ✅ All quality checks passed!' : '### ❌ Some checks failed, please fix before merging.'}`;
            
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: report
            });
